<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>あと施工アンカー引張強度計算ツール</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --border-color: #dfe6e9;
            --text-main: #2d3436;
            --text-sub: #636e72;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0; line-height: 1.6;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        header {
            text-align: center;
            padding: 40px 0;
            background: #fff;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }
        h1 { margin: 0; font-size: 1.8rem; color: var(--primary-color); }
        .sub-title { color: var(--text-sub); font-size: 0.9rem; margin-top: 5px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            padding: 10px 25px; border: 2px solid var(--border-color);
            background: #fff; cursor: pointer; border-radius: 30px;
            font-weight: bold; transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--primary-color); color: #fff; border-color: var(--primary-color);
        }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .card {
            background: var(--card-bg); border-radius: 12px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border-color);
        }
        h3 { border-left: 5px solid var(--accent-color); padding-left: 10px; margin-top: 0; font-size: 1.1rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: var(--text-sub); }
        select, input {
            width: 100%; padding: 12px; border: 1px solid var(--border-color);
            border-radius: 6px; font-size: 1rem; background: #fff;
        }
        input[readonly] { background: #f9f9f9; color: #7f8c8d; }
        .btn-calc {
            width: 100%; padding: 15px; background: var(--success-color);
            color: white; border: none; border-radius: 8px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        #result-display {
            white-space: pre-wrap; font-family: monospace; font-size: 0.9rem;
            background: #fdfdfd; padding: 15px; border: 1px solid #eee;
            border-radius: 6px; margin-top: 15px;
        }
        .summary-box {
            background: var(--primary-color); color: #fff; padding: 20px;
            border-radius: 8px; margin-top: 20px; text-align: center;
        }
        .summary-val { font-size: 2rem; font-weight: bold; color: #f1c40f; }
        @media (max-width: 850px) { .main-content { grid-template-columns: 1fr; } }
        @media print { .tabs, .btn-calc { display: none !important; } }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1>あと施工アンカー引張強度計算</h1>
        <p class="sub-title">金属拡張アンカー / 接着系アンカー 対応</p>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchType('CHEMICAL', this)">接着系（ケミカル）</button>
        <button class="tab-btn" onclick="switchType('METAL', this)">金属拡張系</button>
    </div>

    <div class="main-content">
        <section class="card">
            <h3>設計条件入力</h3>
            <div class="input-group">
                <label>アンカーサイズ</label>
                <select id="anchorSize" onchange="updateValues()"></select>
            </div>
            <div class="input-group">
                <label>鋼材の材質 (降伏強度)</label>
                <select id="material" onchange="updateValues()"></select>
            </div>
            <div class="input-group">
                <label>有効断面積 ao (mm²)</label>
                <input id="area" readonly type="text"/>
            </div>
            <div class="input-group">
                <label>埋込み深さ (mm)</label>
                <input id="embedDepth" type="number" value="100" onchange="updateValues()">
            </div>
            <div class="input-group" id="tipTypeGroup">
